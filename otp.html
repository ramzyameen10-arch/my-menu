<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مراقب أكواد التحقق | OTP Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
    :root {
        --primary: #24b47e;
        --bg: #f4f7f6;
        --dark: #2f3542;
        --danger: #e74c3c;
        --success: #27ae60;
    }
    body {
        font-family: 'Segoe UI', Tahoma, sans-serif;
        background: var(--bg);
        direction: rtl;
        padding: 20px;
        margin: 0;
    }
    .container {
        max-width: 900px;
        margin: auto;
    }
    .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
    }
    .card {
        background: white;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }
    h2 {
        color: var(--dark);
        border-right: 4px solid var(--primary);
        padding-right: 12px;
        margin: 0;
        font-size: 1.2em;
    }
    .refresh-btn {
        background: var(--primary);
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
        transition: 0.3s;
    }
    .refresh-btn:hover { background: #1e9a6a; }
    
    table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 15px;
    }
    th {
        background: #f8f9fa;
        color: #666;
        padding: 12px;
        text-align: right;
        font-size: 14px;
        border-bottom: 2px solid #eee;
    }
    td {
        padding: 12px;
        border-bottom: 1px solid #eee;
        font-size: 15px;
        color: #444;
    }
    .otp-badge {
        background: #e8f5e9;
        color: var(--success);
        padding: 4px 10px;
        border-radius: 6px;
        font-weight: bold;
        font-family: monospace;
        letter-spacing: 1px;
    }
    .phone-number {
        direction: ltr;
        unicode-bidi: embed;
        color: #2f3542;
    }
    .time { color: #888; font-size: 13px; }
    #status { text-align: center; color: #999; padding: 20px; }
    
    /* Responsive */
    @media (max-width: 600px) {
        th:nth-child(3), td:nth-child(3) { display: none; }
    }
</style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>سجل الـ OTP النشط</h2>
        <button class="refresh-btn" onclick="fetchData()">تحديث تلقائي ↻</button>
    </div>

    <div class="card">
        <div id="status">جاري الاتصال بقاعدة البيانات...</div>
        <table id="otpTable" style="display: none;">
            <thead>
                <tr>
                    <th>رقم الهاتف</th>
                    <th>كود التحقق</th>
                    <th>وقت الإرسال</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
        </table>
    </div>
</div>

<script>
    // معلومات الربط الخاصة بك
    const SUPABASE_URL = 'https://wnvyqvwuzmxzzhilgidh.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indudnlxdnd1em14enpoaWxnaWRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MTg1MDEsImV4cCI6MjA5MTQ5NDUwMX0.AyD4CYqA0cz9mC-bcOt16uUpueL_cAWT26Q92l574r0';
    
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function fetchData() {
        const status = document.getElementById('status');
        const table = document.getElementById('otpTable');
        const tbody = document.getElementById('tableBody');

        try {
            // جلب البيانات من جدول whatsapp_otp وترتيبها بالأحدث أولاً
            const { data, error } = await _supabase
                .from('whatsapp_otp')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) throw error;

            if (data && data.length > 0) {
                status.style.display = 'none';
                table.style.display = 'table';
                tbody.innerHTML = '';

                data.forEach(item => {
                    const row = document.createElement('tr');
                    const date = new Date(item.created_at).toLocaleString('ar-EG');
                    
                    row.innerHTML = `
                        <td class="phone-number">${item.phone_number}</td>
                        <td><span class="otp-badge">${item.otp_code}</span></td>
                        <td class="time">${date}</td>
                    `;
                    tbody.appendChild(row);
                });
            } else {
                status.innerText = "لا توجد سجلات حالياً.";
                table.style.display = 'none';
            }
        } catch (err) {
            status.innerText = "خطأ في الجلب: " + err.message;
            status.style.color = 'red';
        }
    }

    // التشغيل عند فتح الصفحة مباشرة
    fetchData();

    // تحديث تلقائي كل 30 ثانية
    setInterval(fetchData, 30000);
</script>

</body>
</html>
