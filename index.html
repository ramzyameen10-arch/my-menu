<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة تجار رمزي - دخول</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 380px; text-align: center; }
        
        /* تنسيق الهيدر الجديد مع الصورة */
        .profile-header { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 20px; }
        .profile-img { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 2px solid #25D366; }
        .profile-header h2 { margin: 0; font-size: 1.4rem; color: #333; }

        input { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 1.1rem; text-align: center; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #25D366; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; font-weight: bold; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        .timer-text { font-size: 0.9rem; color: #666; margin-top: 10px; }
        #resend-link { color: #007bff; cursor: pointer; display: none; text-decoration: underline; margin-top: 10px; font-size: 0.9rem; }
        #step-2 { display: none; }
    </style>
</head>
<body>

<div class="card">
    <div id="step-1">
        <div class="profile-header">
            <img src="https://via.placeholder.com/50" alt="البروفايل" class="profile-img" id="login-logo">
            <h2>منصة تجار رمزي</h2>
        </div>
        
        <p>أدخل رقم الواتساب</p>
        <input type="tel" id="phone" placeholder="9665XXXXXXXX" value="966552806414">
        <button id="send-btn" onclick="requestOTP()">إرسال كود التحقق</button>
    </div>

    <div id="step-2">
        <div class="profile-header">
            <img src="https://via.placeholder.com/50" alt="البروفايل" class="profile-img" id="verify-logo">
            <h2>تحقق من الرمز</h2>
        </div>
        <p id="target-phone"></p>
        <input type="number" id="otp" placeholder="أدخل الكود المكون من 4 أرقام">
        <button id="verify-btn" onclick="verifyOTP()">تأكيد الدخول</button>
        
        <div class="timer-text" id="timer-container">يمكنك إعادة الإرسال خلال: <span id="seconds">60</span> ثانية</div>
        <div id="resend-link" onclick="requestOTP()">إعادة إرسال الكود؟</div>
        
        <p style="color:red; cursor:pointer; margin-top:20px;" onclick="location.reload()">تغيير الرقم</p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    // الرابط الصحيح والمؤكد
    const SB_URL = 'https://wnvyqvwuzmxzzhilgidh.supabase.co'; 
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indudnlxdnd1em14enpoaWxnaWRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MTg1MDEsImV4cCI6MjA5MTQ5NDUwMX0.AyD4CYqA0cz9mC-bcOt16uUpueL_cAWT26Q92l574r0';
    
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
    let timerInterval;

    // ملاحظة لرمزي: يمكنك وضع رابط صورتك الحقيقي هنا
    const myProfileImageUrl = "https://via.placeholder.com/50"; 
    document.getElementById('login-logo').src = myProfileImageUrl;
    document.getElementById('verify-logo').src = myProfileImageUrl;

    function startTimer() {
        let timeLeft = 60;
        const secondsSpan = document.getElementById('seconds');
        const timerContainer = document.getElementById('timer-container');
        const resendLink = document.getElementById('resend-link');

        timerContainer.style.display = 'block';
        resendLink.style.display = 'none';

        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            timeLeft--;
            secondsSpan.innerText = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                timerContainer.style.display = 'none';
                resendLink.style.display = 'block';
            }
        }, 1000);
    }

    async function requestOTP() {
        const phone = document.getElementById('phone').value.trim();
        const btn = document.getElementById('send-btn');
        
        if (!phone) return alert("الرجاء إدخال الرقم");

        btn.disabled = true;
        btn.innerText = "جاري الإرسال...";

        try {
            const { error } = await supabaseClient.rpc('request_whatsapp_otp', { input_phone: phone });
            if (error) throw error;

            document.getElementById('step-1').style.display = 'none';
            document.getElementById('step-2').style.display = 'block';
            document.getElementById('target-phone').innerText = "تم الإرسال إلى: " + phone;
            document.getElementById('otp').value = ""; 
            
            startTimer();

        } catch (err) {
            alert("خطأ: " + err.message);
            btn.disabled = false;
            btn.innerText = "إعادة المحاولة";
        }
    }

    async function verifyOTP() {
        const code = document.getElementById('otp').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const btn = document.getElementById('verify-btn');

        if (!code) return alert("أدخل الكود أولاً");
        btn.disabled = true;

        try {
            const { data, error } = await supabaseClient
                .from('whatsapp_otp')
                .select('*')
                .eq('phone_number', phone)
                .eq('otp_code', code)
                .eq('is_verified', false)
                .maybeSingle();

            if (data) {
                await supabaseClient.from('whatsapp_otp').update({ is_verified: true }).eq('phone_number', phone);
                localStorage.setItem('user_phone', phone);
                localStorage.setItem('is_logged_in', 'true');
                window.location.href = "dashboard.html"; 
            } else {
                alert("الكود غير صحيح أو مستخدم مسبقاً");
                btn.disabled = false;
            }
        } catch (err) {
            alert("فشل التحقق");
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
