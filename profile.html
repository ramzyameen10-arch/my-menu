<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إعدادات الملف الشخصي | منصة القوائم</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #24b47e; --dark: #2f3542; --bg: #f4f7f6; --edit: #3498db; --danger: #e74c3c; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 20px; direction: rtl; }
        .container { max-width: 600px; margin: 0 auto; }
        
        /* الهيدر */
        .header { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; }
        h2 { margin: 0; color: var(--dark); font-size: 1.4em; }

        /* البطاقة التعريفية */
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        
        /* قسم الصورة */
        .profile-preview-wrapper { text-align: center; margin-bottom: 25px; position: relative; }
        .profile-preview-wrapper img { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 4px solid var(--primary); background: #eee; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .upload-btn-wrapper { margin-top: 12px; }
        .btn-upload { background: var(--edit); color: white; padding: 8px 16px; border-radius: 20px; font-size: 13px; cursor: pointer; display: inline-block; border: none; font-weight: bold; }
        #file-input { display: none; }
        #upload-status { font-size: 12px; color: var(--primary); margin-top: 8px; font-weight: bold; }

        /* الحقول */
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: var(--dark); }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; transition: 0.3s; }
        input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 5px rgba(36, 180, 126, 0.2); }
        input:disabled { background: #f0f0f0; cursor: not-allowed; color: #777; }

        /* الأزرار */
        .btn { width: 100%; padding: 14px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; margin-top: 10px; display: block; text-decoration: none; text-align: center; }
        .btn-save { background: var(--primary); color: white; }
        .btn-back { background: #34495e; color: white; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn:disabled { background: #ccc; cursor: not-allowed; transform: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>إعدادات الملف الشخصي</h2>
        <a href="dashboard.html" class="btn" style="width: auto; padding: 8px 15px; margin: 0; font-size: 13px; background: #34495e; color: white;">العودة للوحة التحكم</a>
    </div>

    <div class="card">
        <div class="profile-preview-wrapper">
            <img id="img-preview" src="https://via.placeholder.com/120" alt="الصورة الشخصية">
            <div class="upload-btn-wrapper">
                <label for="file-input" class="btn-upload">📷 رفع صورة جديدة</label>
                <input type="file" id="file-input" accept="image/*" onchange="uploadImage(this)">
                <div id="upload-status" style="display: none;"></div>
            </div>
        </div>

        <input type="hidden" id="internal_user_id">
        <input type="hidden" id="profile_img_url_hidden">

        <div class="form-group">
            <label>اسم المستخدم</label>
            <input type="text" id="username" placeholder="مثال: رمزي أمين">
        </div>

        <div class="form-group">
            <label>رقم الهاتف (للتوثيق فقط)</label>
            <input type="text" id="phone_display" disabled>
        </div>

        <button id="save-btn" class="btn btn-save" onclick="updateProfile()">حفظ التعديلات</button>
        <a href="dashboard.html" class="btn btn-back">إلغاء</a>
    </div>
</div>

<script>
    // إعدادات الاتصال بـ Supabase
    const SB_URL = 'https://wnvyqvwuzmxzzhilgidh.supabase.co'; 
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indudnlxdnd1em14enpoaWxnaWRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MTg1MDEsImV4cCI6MjA5MTQ5NDUwMX0.AyD4CYqA0cz9mC-bcOt16uUpueL_cAWT26Q92l574r0';
    const _supabase = supabase.createClient(SB_URL, SB_KEY);
    
    // الحصول على رقم الهاتف من التخزين المحلي
    const userPhone = (localStorage.getItem('user_phone') || "").trim();

    // تشغيل الصفحة
    async function init() {
        if (!userPhone) {
            alert("يرجى تسجيل الدخول أولاً");
            window.location.href = "index.html";
            return;
        }
        await loadUserData();
    }

    // 1. جلب بيانات المستخدم وتخزين الـ ID
    async function loadUserData() {
        try {
            const { data, error } = await _supabase
                .from('profiles')
                .select('*')
                .eq('phone_number', userPhone)
                .maybeSingle();

            if (error) throw error;

            if (data) {
                // أهم خطوة: تخزين الـ UUID في حقل مخفي
                document.getElementById('internal_user_id').value = data.id;
                document.getElementById('username').value = data.username || '';
                document.getElementById('phone_display').value = data.phone_number || '';
                document.getElementById('profile_img_url_hidden').value = data.profile_img_url || '';
                
                if (data.profile_img_url) {
                    document.getElementById('img-preview').src = data.profile_img_url;
                }
            } else {
                alert("لم يتم العثور على سجل بروفايل لهذا الرقم.");
            }
        } catch (err) {
            console.error("Fetch Error:", err.message);
        }
    }

    // 2. وظيفة رفع الصورة إلى الـ Storage
    async function uploadImage(input) {
        const file = input.files[0];
        if (!file) return;

        const statusLabel = document.getElementById('upload-status');
        statusLabel.style.display = "block";
        statusLabel.innerText = "⏳ جاري رفع الصورة...";
        statusLabel.style.color = "var(--edit)";

        try {
            const fileExt = file.name.split('.').pop();
            const fileName = `avatar_${Date.now()}.${fileExt}`;

            // الرفع إلى الحاوية (Bucket) المسماة avatars
            const { data, error } = await _supabase.storage
                .from('avatars')
                .upload(fileName, file);

            if (error) throw error;

            // جلب الرابط العام للصورة
            const { data: urlData } = _supabase.storage.from('avatars').getPublicUrl(fileName);
            const publicUrl = urlData.publicUrl;

            // تحديث المعاينة والحقل المخفي
            document.getElementById('img-preview').src = publicUrl;
            document.getElementById('profile_img_url_hidden').value = publicUrl;
            
            statusLabel.innerText = "✅ تم الرفع بنجاح";
            statusLabel.style.color = "var(--primary)";
        } catch (err) {
            alert("خطأ أثناء الرفع: " + err.message);
            statusLabel.innerText = "❌ فشل الرفع";
            statusLabel.style.color = "var(--danger)";
        }
    }

    // 3. وظيفة التحديث باستخدام الـ ID (المعرف الفريد)
    async function updateProfile() {
        const saveBtn = document.getElementById('save-btn');
        const targetUuid = document.getElementById('internal_user_id').value;
        const newUsername = document.getElementById('username').value;
        const newImageUrl = document.getElementById('profile_img_url_hidden').value;

        if (!targetUuid) {
            alert("خطأ: لم يتم تحميل معرف المستخدم. يرجى إعادة تحميل الصفحة.");
            return;
        }

        saveBtn.disabled = true;
        saveBtn.innerText = "⏳ جاري حفظ البيانات...";

        try {
            // التحديث بالاعتماد على الـ ID لضمان الأمان والدقة
            const { data, error } = await _supabase
                .from('profiles')
                .update({ 
                    username: newUsername, 
                    profile_img_url: newImageUrl 
                })
                .eq('id', targetUuid)
                .select();

            if (error) throw error;

            if (data && data.length > 0) {
                alert("🎉 تم تحديث ملفك الشخصي بنجاح");
                window.location.reload();
            } else {
                alert("لم يتم إجراء أي تغييرات. تأكد من الصلاحيات.");
            }
        } catch (err) {
            alert("فشل التحديث: " + err.message);
        } finally {
            saveBtn.disabled = false;
            saveBtn.innerText = "حفظ التعديلات";
        }
    }

    // تشغيل الدالة الأساسية عند التحميل
    init();
</script>

</body>
</html>
