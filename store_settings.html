<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة المتاجر | نظام المنيو</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --primary: #24b47e; --danger: #e74c3c; --edit: #3498db; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); direction: rtl; padding: 20px; margin: 0; }
        .container { max-width: 1000px; margin: auto; }
        
        .nav-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .welcome-section { font-size: 1.2em; font-weight: bold; color: #333; }
        .nav-btns { display: flex; gap: 10px; }
        
        .btn-nav { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; text-decoration: none; font-size: 14px; }
        .btn-back { background: #34495e; color: white; }
        .btn-logout { background: var(--danger); color: white; }
        .btn-add-toggle { background: var(--primary); color: white; margin-bottom: 15px; }

        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h2 { color: #333; border-right: 4px solid var(--primary); padding-right: 10px; margin-bottom: 20px; }
        
        #form-container { display: none; }

        .store-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border: 1px solid #eee; border-radius: 12px; margin-bottom: 15px; background: #fff; }
        .store-info { display: flex; align-items: center; gap: 15px; flex: 1; }
        .store-logo-img { width: 60px; height: 60px; border-radius: 10px; object-fit: cover; background: #f0f0f0; border: 1px solid #ddd; }
        .store-details strong { color: var(--primary); font-size: 1.2em; display: block; }
        
        /* تنسيق الروابط والأزرار الجديدة */
        .link-group { display: flex; align-items: center; gap: 10px; margin-top: 8px; flex-wrap: wrap; }
        .store-link { font-size: 0.85em; color: var(--edit); text-decoration: none; font-weight: bold; }
        .btn-mini { background: #f0f0f0; border: 1px solid #ddd; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 11px; display: flex; align-items: center; gap: 4px; color: #555; }
        .btn-mini:hover { background: #e0e0e0; }
        
        .actions-group { display: flex; gap: 8px; flex-wrap: wrap; }
        .btn-action { padding: 8px 12px; border-radius: 6px; border: none; cursor: pointer; font-size: 13px; color: white; font-weight: bold; }
        
        .btn-category { background: #8e44ad; }
        .btn-product { background: #f39c12; }
        .btn-edit { background: var(--edit); }
        .btn-delete { background: var(--danger); }

        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        
        .logo-upload-section { text-align: center; margin-bottom: 15px; background: #f9f9f9; padding: 15px; border-radius: 8px; border: 1px dashed #ccc; }
        #logo-preview { width: 80px; height: 80px; object-fit: cover; border-radius: 10px; margin-bottom: 10px; display: none; margin: 0 auto 10px; }
        .btn-upload-label { background: var(--edit); color: white; padding: 8px 20px; border-radius: 5px; cursor: pointer; display: inline-block; font-size: 14px; }
        
        .btn-save { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; }

        /* نافذة الـ QR */
        #qr-modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:9999; justify-content:center; align-items:center; }
        .modal-body { background:white; padding:25px; border-radius:15px; text-align:center; position:relative; max-width:320px; width:90%; }
        #qrcode-canvas { margin: 15px auto; display: flex; justify-content: center; }
        .btn-print { background: var(--primary); color:white; border:none; padding:10px 20px; border-radius:6px; cursor:pointer; width:100%; font-weight:bold; margin-top:10px; }

        @media print {
            body * { visibility: hidden; }
            #qrcode-canvas, #qrcode-canvas * { visibility: visible; }
            #qrcode-canvas { position: absolute; left: 50%; top: 30%; transform: translateX(-50%); }
        }
    </style>
</head>
<body>

<div id="qr-modal" onclick="closeQR()">
    <div class="modal-body" onclick="event.stopPropagation()">
        <h3 id="qr-title" style="margin-top:0">رمز QR المتجر</h3>
        <div id="qrcode-canvas"></div>
        <button class="btn-print" onclick="window.print()">🖨️ طباعة الكود</button>
        <button onclick="closeQR()" style="margin-top:10px; background:none; border:none; color:#999; cursor:pointer">إغلاق</button>
    </div>
</div>

<div class="container">
    <div class="nav-bar">
        <div class="welcome-section" id="welcome-msg-user">جاري التحميل...</div>
        <div class="nav-btns">
            <a href="dashboard.html" class="btn-nav btn-back">العودة للوحة التحكم</a>
            <button onclick="logout()" class="btn-nav btn-logout">تسجيل الخروج</button>
        </div>
    </div>

    <div class="card">
        <h2>متاجرك المسجلة</h2>
        <div id="status-msg" style="text-align:center; color:#666;">جاري تحميل البيانات...</div>
        <div id="stores-list"></div>
        <button class="btn-nav btn-add-toggle" id="toggle-btn" onclick="toggleForm()">إضافة متجر جديد +</button>
    </div>

    <div class="card" id="form-container">
        <h2 id="form-title">إضافة متجر جديد</h2>
        
        <div class="logo-upload-section">
            <img id="logo-preview" src="" alt="شعار المتجر">
            <div>
                <label for="logo-file" class="btn-upload-label">📷 رفع شعار المتجر</label>
                <input type="file" id="logo-file" accept="image/*" style="display:none" onchange="uploadStoreLogo(this)">
            </div>
            <small id="upload-status" style="display:block; margin-top:5px; color:var(--primary)"></small>
        </div>

        <input type="hidden" id="edit_store_id"> 
        <input type="hidden" id="logo_url"> 
        
        <input type="text" id="store_name" placeholder="اسم المتجر">
        <input type="text" id="store_slug" placeholder="رابط المتجر بالإنجليزية (مثال: basil-perfume)" oninput="validateSlug(this)">
        <input type="text" id="welcome_msg" placeholder="رسالة الترحيب للزبائن">
        <textarea id="store_description" rows="2" placeholder="وصف المتجر"></textarea>
        
        <div style="margin: 10px 0;">
            <label>لون الهوية:</label>
            <input type="color" id="primary_color" value="#24b47e" style="height: 40px; cursor: pointer;">
        </div>
        
        <button id="save-btn" class="btn-save" onclick="handleSaveStore()">حفظ البيانات</button>
        <button id="cancel-btn" style="margin-top:10px; background:#95a5a6;" class="btn-save" onclick="toggleForm()">إلغاء</button>
    </div>
</div>

<script>
    const SB_URL = 'https://wnvyqvwuzmxzzhilgidh.supabase.co'; 
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indudnlxdnd1em14enpoaWxnaWRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MTg1MDEsImV4cCI6MjA5MTQ5NDUwMX0.AyD4CYqA0cz9mC-bcOt16uUpueL_cAWT26Q92l574r0';
    const _supabase = supabase.createClient(SB_URL, SB_KEY);
    const userPhone = (localStorage.getItem('user_phone') || "").trim();

    async function init() {
        if (!userPhone) { window.location.href = 'index.html'; return; }
        await fetchUserInfo();
        await loadStores();
    }

    async function fetchUserInfo() {
        try {
            const { data } = await _supabase.from('profiles').select('username').eq('phone_number', userPhone).single();
            document.getElementById('welcome-msg-user').innerText = data?.username ? `مرحباً، ${data.username}` : `مرحباً بك`;
        } catch (err) { console.log(err); }
    }

    async function uploadStoreLogo(input) {
        const file = input.files[0];
        if (!file) return;
        const status = document.getElementById('upload-status');
        const preview = document.getElementById('logo-preview');
        status.innerText = "⏳ جاري الرفع...";

        try {
            const fileName = `store_${Date.now()}.${file.name.split('.').pop()}`;
            const { data, error } = await _supabase.storage.from('avatars').upload(fileName, file);
            if (error) throw error;

            const { data: urlData } = _supabase.storage.from('avatars').getPublicUrl(fileName);
            document.getElementById('logo_url').value = urlData.publicUrl;
            preview.src = urlData.publicUrl;
            preview.style.display = "block";
            status.innerText = "✅ تم الرفع";
        } catch (err) {
            alert("خطأ: " + err.message);
            status.innerText = "❌ فشل الرفع";
        }
    }

    async function loadStores() {
        try {
            const { data: profile } = await _supabase.from('profiles').select('id').eq('phone_number', userPhone).single();
            const { data: stores } = await _supabase.from('store_settings').select('*').eq('user_id', profile.id);
            document.getElementById('status-msg').style.display = 'none';
            const listDiv = document.getElementById('stores-list');
            
            if (stores && stores.length > 0) {
                const currentHref = window.location.href;
                const directory = currentHref.substring(0, currentHref.lastIndexOf('/'));
                const baseUrl = directory + '/view_menu.html';

                listDiv.innerHTML = stores.map(s => {
                    const fullUrl = `${baseUrl}?s=${s.store_slug}`;
                    return `
                        <div class="store-item">
                            <div class="store-info">
                                <img class="store-logo-img" src="${s.logo_url || 'https://via.placeholder.com/60'}" onerror="this.src='https://via.placeholder.com/60'">
                                <div class="store-details">
                                    <strong>${s.store_name}</strong>
                                    <div class="link-group">
                                        <a href="${fullUrl}" target="_blank" class="store-link">🔗 فتح المنيو</a>
                                        <button class="btn-mini" onclick="copyToClipboard('${fullUrl}')">📋 نسخ</button>
                                        <button class="btn-mini" onclick="generateQR('${fullUrl}', '${s.store_name}')">📱 QR</button>
                                    </div>
                                </div>
                            </div>
                            <div class="actions-group">
                                <button class="btn-action btn-category" onclick="window.location.href='manage_categories.html?store_id=${s.id}'">التصنيفات</button>
                                <button class="btn-action btn-product" onclick="window.location.href='manage_products.html?store_id=${s.id}'">المنتجات</button>
                                <button class="btn-action btn-edit" onclick='editExistingStore(${JSON.stringify(s)})'>تعديل</button>
                                <button class="btn-action btn-delete" onclick="deleteStore('${s.id}')">حذف</button>
                            </div>
                        </div>
                    `;
                }).join('');
            } else { listDiv.innerHTML = "<p style='text-align:center;'>لا يوجد متاجر مضافة.</p>"; }
        } catch (err) { console.error(err); }
    }

    // وظيفة نسخ الرابط
    function copyToClipboard(text) {
        navigator.clipboard.writeText(text).then(() => {
            alert("تم نسخ الرابط بنجاح!");
        }).catch(err => {
            console.error('فشل النسخ: ', err);
        });
    }

    // وظيفة توليد QR Code
    function generateQR(url, name) {
        const qrContainer = document.getElementById('qrcode-canvas');
        qrContainer.innerHTML = ""; // مسح الكود القديم
        document.getElementById('qr-title').innerText = "QR Code: " + name;
        
        new QRCode(qrContainer, {
            text: url,
            width: 200,
            height: 200,
            colorDark : "#000000",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });
        
        document.getElementById('qr-modal').style.display = "flex";
    }

    function closeQR() {
        document.getElementById('qr-modal').style.display = "none";
    }

    async function handleSaveStore() {
        const saveBtn = document.getElementById('save-btn');
        const storeId = document.getElementById('edit_store_id').value;
        const storeData = {
            store_name: document.getElementById('store_name').value,
            store_slug: document.getElementById('store_slug').value,
            logo_url: document.getElementById('logo_url').value,
            welcome_msg: document.getElementById('welcome_msg').value,
            store_description: document.getElementById('store_description').value,
            primary_color: document.getElementById('primary_color').value,
        };

        if (!storeData.store_name || !storeData.store_slug) { alert("يرجى ملء الاسم والرابط"); return; }
        saveBtn.disabled = true;
        saveBtn.innerText = "جاري الحفظ...";

        try {
            if (storeId) {
                await _supabase.from('store_settings').update(storeData).eq('id', storeId);
            } else {
                const { data: profile } = await _supabase.from('profiles').select('id').eq('phone_number', userPhone).single();
                storeData.user_id = profile.id;
                await _supabase.from('store_settings').insert([storeData]);
            }
            location.reload();
        } catch (err) { alert(err.message); saveBtn.disabled = false; }
    }

    function editExistingStore(store) {
        if(document.getElementById('form-container').style.display !== "block") toggleForm();
        document.getElementById('form-title').innerText = "تعديل: " + store.store_name;
        document.getElementById('edit_store_id').value = store.id;
        document.getElementById('store_name').value = store.store_name;
        document.getElementById('store_slug').value = store.store_slug;
        document.getElementById('logo_url').value = store.logo_url;
        document.getElementById('welcome_msg').value = store.welcome_msg;
        document.getElementById('store_description').value = store.store_description;
        document.getElementById('primary_color').value = store.primary_color;
        if(store.logo_url) {
            document.getElementById('logo-preview').src = store.logo_url;
            document.getElementById('logo-preview').style.display = "block";
        }
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function toggleForm() {
        const f = document.getElementById('form-container');
        const b = document.getElementById('toggle-btn');
        const isHidden = (f.style.display === "none" || f.style.display === "");
        f.style.display = isHidden ? "block" : "none";
        b.style.display = isHidden ? "none" : "block";
        if (!isHidden) resetForm();
    }

    function resetForm() {
        document.getElementById('edit_store_id').value = '';
        document.getElementById('logo_url').value = '';
        document.getElementById('logo-preview').style.display = "none";
        document.getElementById('upload-status').innerText = "";
        document.querySelectorAll('#form-container input:not([type=color]), #form-container textarea').forEach(i => i.value = '');
        document.getElementById('form-title').innerText = "إضافة متجر جديد";
    }

    function validateSlug(i) { i.value = i.value.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, ''); }

    async function deleteStore(id) { if (confirm("حذف المتجر نهائياً؟")) { await _supabase.from('store_settings').delete().eq('id', id); location.reload(); } }

    function logout() { localStorage.removeItem('user_phone'); window.location.href='index.html'; }

    init();
</script>
</body>
</html>
